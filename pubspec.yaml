name: curiousinsights
description: On-device SMS & Notification Intelligence Engine
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1

  # Navigation
  go_router: ^13.2.0

  # Local Database
  sqflite: ^2.3.3
  path: ^1.9.0

  # Secure Storage & Encryption
  flutter_secure_storage: ^9.2.2
  encrypt: ^5.0.3

  # PDF Generation & Export
  pdf: ^3.11.1
  printing: ^5.13.1

  # File Sharing
  share_plus: ^12.0.2
  flutter_email_sender: ^6.0.3
  path_provider: ^2.1.3
  #open_file: ^3.3.2

  # Permissions
  permission_handler: ^11.3.1

  # Charts
  fl_chart: ^0.68.0

  # Background Work
  workmanager: ^0.6.0

  # Notifications
  flutter_local_notifications: ^17.2.2

  # Utilities
  intl: ^0.19.0
  equatable: ^2.0.5
  uuid: ^4.4.0
  logger: ^2.4.0
  connectivity_plus: ^6.0.3
  package_info_plus: ^8.0.0
  shared_preferences: ^2.2.3

  # UI
  shimmer: ^3.0.0
  cached_network_image: ^3.3.1
  lottie: ^3.1.2

  cupertino_icons: ^1.0.6
  open_filex: ^4.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  mockito: ^5.4.4
  build_runner: ^2.4.11

